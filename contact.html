body{

/* Navbar */

nav{
background:#020617;
padding:15px 50px;
}

nav ul{
display:flex;

form{
max-width:500px;
margin:auto;
display:flex;
flex-direction:column;
}

input, textarea{
margin-bottom:15px;
padding:12px;
border:none;
border-radius:6px;
font-size:16px;
}

textarea{
height:120px;
resize:none;
}

/* Button */

button{
padding:12px;
background:#38bdf8;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0ea5e9;
transform:scale(1.05);
}

/* Footer */

footer{
text-align:center;
padding:20px;
background:#020617;
margin-top:50px;
color:#94a3b8;
}
