<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0f172a;
color:white;
}

/* Navbar */

nav{
background:#020617;
padding:15px 50px;
}

nav ul{
display:flex;
justify-content:flex-end;
list-style:none;
}

nav ul li{
margin-left:30px;
}

nav ul li a{
text-decoration:none;
color:white;
font-size:18px;
transition:0.3s;
}

nav ul li a:hover{
color:#38bdf8;
}

/* Main Section */

main{
display:flex;
align-items:center;
justify-content:space-between;
padding:80px 100px;
}

/* Left Text */

.left-side h1{
font-size:32px;
margin-bottom:10px;
}

.left-side h2{
font-size:45px;
color:#38bdf8;
}

.left-side h3{
font-size:28px;
margin:10px 0;
}

.description{
margin-top:15px;
max-width:400px;
line-height:1.6;
color:#cbd5f5;
}

/* Button */

.btn{
margin-top:25px;
padding:12px 25px;
border:none;
background:#38bdf8;
color:black;
font-size:16px;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
background:#0ea5e9;
transform:scale(1.05);
}

/* Profile Image */

.profile-pic img{
width:300px;
border-radius:50%;
border:5px solid #38bdf8;
}

/* Footer */

footer{
text-align:center;
padding:20px;
background:#020617;
margin-top:50px;
color:#94a3b8;
}

</style>

</head>
